<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
  overflow:hidden;
}

.screen{
  display:none;
  width:100vw;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.show{display:flex;}

input{
  padding:14px;
  width:70%;
  border:none;
  border-radius:15px;
}

button{
  padding:14px 26px;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,#ff4d6d,#6cf);
  color:white;
  margin-top:10px;
}

/* PHOTO */
#photo{
  width:70vw;
  height:70vw;
  object-fit:cover;
  border-radius:20px;
  box-shadow:0 0 20px pink;
}

/* TEXT */
#wish{
  font-size:4vw;
  line-height:1.6;
}

/* COUNT */
#count{
  font-size:22vw;
}

/* PROPOSAL */
#proposal{
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
  overflow:hidden;
}

/* PROPOSAL IMAGE */
#proposalImg{
  width:90%;
  max-height:90%;
  opacity:0;
  transform:translateY(150px) scale(0.6);
  transition:all 2.5s cubic-bezier(.2,.8,.2,1);
  filter:drop-shadow(0 0 25px pink);
}

/* ROAM ANIMATION */
@keyframes roam {
  0% {transform:translate(0,0) scale(0.65);}
  25% {transform:translate(60px,-40px) scale(0.7);}
  50% {transform:translate(-70px,40px) scale(0.7);}
  75% {transform:translate(50px,60px) scale(0.7);}
  100% {transform:translate(0,0) scale(0.65);}
}

.roaming{
  animation: roam 0.4s infinite linear;
}

/* PULSE */
@keyframes pulsePop {
  0% {opacity:1; transform:scale(1);}
  50% {opacity:0; transform:scale(0.9);}
  100% {opacity:1; transform:scale(1);}
}

/* PAPER OPEN */
.paperOpen {
  animation: paperOpen 2.5s ease forwards;
}

@keyframes paperOpen {
  0% {transform:scaleX(0.2); opacity:0;}
  40% {transform:scaleX(1.1); opacity:1;}
  100% {transform:scaleX(1); opacity:1;}
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen show">
  <div>
    <h2>🔐 Enter Password</h2>
    <input id="pass">
    <button onclick="unlock()">Unlock</button>
  </div>
</div>

<!-- BIRTHDAY -->
<div id="main" class="screen">
  <div>
    <h2>Happy Birthday 💖</h2>
    <img id="photo" src="photo1.jpg">
    <p id="wish"></p>
    <button onclick="start()">Tap for Surprise 💖</button>
  </div>
</div>

<!-- COUNT -->
<div id="countScreen" class="screen">
  <h1 id="count">5</h1>
</div>

<!-- READY -->
<div id="readyScreen" class="screen">
  <h2>Are you ready? 💖</h2>
  <button id="yesBtn" onclick="goNext()">Yes 💕</button>
</div>

<!-- WAIT -->
<div id="waitScreen" class="screen">
  <h2>💌 Special message from your Smartie is coming...</h2>
</div>

<!-- PROPOSAL -->
<div id="proposal" class="screen">
  <img id="proposalImg" src="proposal-card.jpg">
</div>

<audio id="boom" src="boom.mp3"></audio>
<audio id="music" src="makhamali.mp3"></audio>

<script>

let boom=document.getElementById("boom");
let music=document.getElementById("music");

/* SCREEN CONTROL */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("show"));
  document.getElementById(id).classList.add("show");
}

/* PASSWORD */
function unlock(){
  let val=document.getElementById("pass").value.trim().toLowerCase();

  if(val==="angry bird"){
    boom.play();
    show("main");
    typeText();
  }
}

/* 💖 FULL BIRTHDAY WISH (YOUR EXACT TEXT) */
let text=`Wishing you a very happy and joyful birthday 🎂💗
May your life always be filled with happiness, love, and success.
May all your dreams and wishes come true.
It’s not just your birthday… it’s the day someone special like you came into this world and made my life better in many ways.
You’ve become someone really special to me. Stay the same, my favourite Angry Bird 🐦❤️
Once again, happy birthday to my special person 💗✨`;

let i=0;

function typeText(){
  let box=document.getElementById("wish");
  box.innerHTML="";
  let t=setInterval(()=>{
    box.innerHTML+=text.charAt(i);
    i++;
    if(i>=text.length) clearInterval(t);
  },60);
}

/* PHOTO SLIDER */
let photos=["photo1.jpg","photo2.jpg","photo3.jpg","photo4.jpg"];

setInterval(()=>{
  let img=document.getElementById("photo");
  if(!img) return;
  img.src=photos[Math.floor(Math.random()*photos.length)];
},3000);

/* START */
function start(){

  boom.pause();
  boom.currentTime=0;

  show("countScreen");

  let c=5;

  let t=setInterval(()=>{
    c--;
    document.getElementById("count").innerText=c;

    if(c===0){
      clearInterval(t);

      music.loop=true;
      music.play(); // 🎧 starts here

      show("readyScreen");

      startButtonChaos();
    }
  },1000);
}

/* YES BUTTON CHAOS (LEGENDARY ENTRY SUPPORT) */
function startButtonChaos(){

  let btn=document.getElementById("yesBtn");

  btn.classList.add("roaming");

  setTimeout(()=>{
    btn.classList.remove("roaming");
  },5000);
}

/* NEXT */
function goNext(){

  show("waitScreen");

  setTimeout(()=>{
    showProposal();
  },3500);

}

/* 💎 LEGENDARY PROPOSAL ENTRY */
function showProposal(){

  show("proposal");

  let img=document.getElementById("proposalImg");

  // STEP 1: roaming suspense
  let roam=0;

  let interval=setInterval(()=>{

    img.style.opacity="0.5";
    img.style.transform=
      `translate(${Math.random()*50-25}px, ${Math.random()*50-25}px)
       scale(0.65)`;

    roam++;

    if(roam>7){
      clearInterval(interval);

      // STEP 2: center entry
      setTimeout(()=>{
        img.style.transition="all 3s cubic-bezier(.2,.8,.2,1)";
        img.style.transform="translate(0,0) scale(1)";
        img.style.opacity="1";
      },300);

      // STEP 3: pulse
      setTimeout(()=>{
        img.style.animation="pulsePop 0.5s ease 2";
      },3500);

      // STEP 4: final paper open reveal
      setTimeout(()=>{
        img.classList.add("paperOpen");
      },4500);

    }

  },200);
}

</script>

</body>
  </html>
